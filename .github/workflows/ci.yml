name: v4 verification

on:
  push:
    branches: [v4]
  pull_request:
    branches: [v4]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install verification dependencies
        run: python -m pip install -e ".[experiments,validation,dev]"
      - name: Verify tests, evidence hashes, gates, and generated artifacts
        run: make v4-verify PYTHON=python
